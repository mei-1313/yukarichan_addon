<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ゆかりちゃんアドオン設定</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #fff9f6;
      --card-bg: rgba(255, 255, 255, 0.9);
      --border-color: #eadacf;
      --text-main: #3e2723;
      --text-sub: #7d6b63;
      --accent-color: #d84315;
      --accent-hover: #bf360c;
      --success-color: #2e7d32;
    }

    body {
      background: linear-gradient(135deg, #fff5f5, #fffdfb, #fcf4ec);
      color: var(--text-main);
      font-family: 'Noto Serif JP', 'Outfit', sans-serif;
      margin: 0;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      box-sizing: border-box;
    }

    .container {
      max-width: 800px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    header {
      text-align: center;
      margin-bottom: 10px;
    }

    header h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-main);
      margin: 0 0 10px 0;
      letter-spacing: 0.05em;
    }

    header p {
      color: var(--text-sub);
      margin: 0;
      font-size: 14px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(222, 203, 190, 0.15);
      backdrop-filter: blur(10px);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      box-shadow: 0 12px 40px rgba(222, 203, 190, 0.25);
    }

    .card h2 {
      font-size: 18px;
      margin-top: 0;
      margin-bottom: 20px;
      border-left: 4px solid var(--accent-color);
      padding-left: 12px;
      color: var(--text-main);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-main);
    }

    .input-wrapper {
      display: flex;
      gap: 12px;
    }

    input[type="password"], input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 14px;
      background: #faf8f5;
      color: var(--text-main);
      transition: border-color 0.3s, box-shadow 0.3s;
      font-family: monospace;
    }

    input[type="password"]:focus, input[type="text"]:focus {
      outline: none;
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px rgba(216, 67, 21, 0.1);
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent-color), #f4511e);
      color: white;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
      box-shadow: 0 4px 12px rgba(216, 67, 21, 0.2);
    }

    button:hover {
      opacity: 0.95;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(1px);
    }

    button.btn-secondary {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-main);
      box-shadow: none;
    }

    button.btn-secondary:hover {
      background: rgba(222, 203, 190, 0.1);
    }

    button.btn-danger {
      background: #c62828;
      box-shadow: 0 4px 12px rgba(198, 40, 40, 0.2);
    }

    button.btn-danger:hover {
      background: #b71c1c;
    }

    .status-msg {
      margin-top: 12px;
      font-size: 13px;
      min-height: 20px;
      font-weight: bold;
      transition: opacity 0.3s;
    }

    .status-msg.success {
      color: var(--success-color);
    }

    .status-msg.error {
      color: #c62828;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .history-header h2 {
      margin: 0;
    }

    .history-list {
      max-height: 400px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
      padding-right: 8px;
    }

    /* カスタムスクロールバー */
    .history-list::-webkit-scrollbar {
      width: 6px;
    }
    .history-list::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.02);
      border-radius: 3px;
    }
    .history-list::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 3px;
    }

    .history-item {
      padding: 16px;
      background: #faf8f5;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 13px;
    }

    .history-meta {
      display: flex;
      justify-content: space-between;
      color: var(--text-sub);
      font-size: 11px;
    }

    .history-title {
      font-weight: 700;
      color: var(--text-main);
    }

    .history-url {
      color: var(--accent-color);
      text-decoration: none;
      word-break: break-all;
    }

    .history-url:hover {
      text-decoration: underline;
    }

    .history-response {
      background: white;
      border-left: 3px solid var(--border-color);
      padding: 10px 12px;
      border-radius: 0 6px 6px 0;
      color: #5d4037;
      line-height: 1.5;
    }

    .no-history {
      text-align: center;
      color: var(--text-sub);
      padding: 40px 0;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>ゆかりちゃんアドオン 設定</h1>
      <p>〜お淑やかなマスコットとの対話の設定〜</p>
    </header>

    <div class="card">
      <h2>Gemini API 設定</h2>
      <div class="form-group">
        <label for="api-key">Gemini API キー</label>
        <div class="input-wrapper">
          <input type="password" id="api-key" placeholder="AIzaSy...">
          <button id="save-btn">保存</button>
        </div>
        <div id="status-msg" class="status-msg"></div>
      </div>
    </div>

    <div class="card">
      <div class="history-header">
        <h2>会話履歴 (visit_history)</h2>
        <button id="clear-btn" class="btn-secondary btn-danger">履歴をクリア</button>
      </div>
      <div id="history-container">
        <div class="no-history">履歴はまだございません。</div>
      </div>
    </div>

    <div class="card">
      <h2>設定と履歴のバックアップ</h2>
      <p style="font-size: 13px; color: var(--text-sub); margin-top: 0; margin-bottom: 20px;">
        Firefoxの一時インストール環境などで、ブラウザ終了時にAPIキーや履歴がリセットされてしまう際にご利用ください。保存したJSONファイルを読み込むことで復元できます。
      </p>
      <div style="display: flex; gap: 12px; align-items: center;">
        <button id="export-btn" class="btn-secondary">バックアップを書き出す</button>
        <button id="import-trigger-btn" class="btn-secondary">バックアップを読み込む</button>
        <input type="file" id="import-file" accept=".json" style="display: none;">
      </div>
      <div id="backup-status-msg" class="status-msg"></div>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
